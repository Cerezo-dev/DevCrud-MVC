<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h2 class="mb-0">Mantenimiento de Productos</h2>
    </div>
    <div class="card-body">

        <div class="d-flex justify-content-between mb-3">
            <h4>Lista de Productos</h4>
            <a href="nuevo#" class="btn btn-success">Agregar Nuevo</a>
        </div>

        <table class="table table-hover table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Fecha Creación</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.nombre}">Producto</td>
                <td th:text="${p.descripcion}">Descripción</td>
                <td th:text="${p.cantidad}">0</td>
                <td th:text="${'S/ ' + p.precio}">0.00</td>
                <td th:text="${p.created}">01/01/2026</td>
                <td>
                    <span th:if="${p.disponible}" class="badge bg-success">Disponible</span>
                    <span th:unless="${p.disponible}" class="badge bg-danger">Agotado</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="7" class="text-center">No hay productos registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

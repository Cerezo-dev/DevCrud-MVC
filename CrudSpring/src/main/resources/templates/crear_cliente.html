<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-12">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Registrar Nuevo Cliente</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="POST">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" th:field="*{apellido}" class="form-control" placeholder="Ej: Pérez" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Ej: juan@example.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control" placeholder="Ej: 999999999" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ciudad</label>
                        <input type="text" th:field="*{ciudad}" class="form-control" placeholder="Ej: Lima" required>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" th:field="*{activo}" class="form-check-input" id="activo">
                        <label class="form-check-label" for="activo">¿Cliente activo?</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                        <a th:href="@{/clientes/listar}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
